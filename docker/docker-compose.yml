services:
  django:
    build:
      context: .
      dockerfile: ./Django_Dockerfile
    restart: always
    command: python sumsaar/webserver/manage.py runserver 0.0.0.0:8000
    container_name: sumsaar_django
    volumes:
      - ../:/app
    ports:
      - "8010:8000"
    depends_on:
      django-migrate:
        condition: service_completed_successfully
      playwright:
        condition: service_started
      mongo:
        condition: service_started
    env_file:
      - image_env

  django-migrate:
    build:
      context: .
      dockerfile: ./Django_Dockerfile
    command: >
      sh -c "python sumsaar/webserver/manage.py makemigrations &&
             python sumsaar/webserver/manage.py migrate"
    volumes:
      - ../:/app
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started

  celery-worker:
    build:
      context: .
      dockerfile: ./Celery_Dockerfile
    command: celery -A webserver worker -l info
    volumes:
      - ../:/app
    depends_on:
      django-migrate:
        condition: service_completed_successfully
      django:
        condition: service_started
      redis:
        condition: service_started
      playwright:
        condition: service_started
      mongo:
        condition: service_started
    env_file:
      - image_env

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: nayak
      POSTGRES_PASSWORD: testing@123
      POSTGRES_DB: sumsaar
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nayak", "-d", "sumsaar"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:7.2-bookworm
    ports:
      - '6378:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.0-jammy
    command: npx -y playwright run-server --port 3000 --host 0.0.0.0
    ipc: host
    ports:
      - "3000:3000"
    restart: always

  mongo:
    image: mongo:8.0
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongo-data:/data/db
    env_file:
      - image_env

volumes:
  postgres-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./postgres-data

  mongo-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./mongo-data
