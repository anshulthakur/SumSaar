<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Articles - SumSaar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'chitrapat:article_list' %}">SumSaar</a>
            <div class="navbar-nav flex-row">
                <a class="nav-link me-3" href="{% url 'chitrapat:pipeline_dashboard' %}">Dashboard</a>
                <a class="nav-link active" href="{% url 'chitrapat:raw_article_list' %}">Raw Articles</a>
            </div>
            <button class="btn btn-outline-success" id="fetch-button">Fetch</button>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4">Raw Articles Staging</h1>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Feed ID</th>
                        <th>Title</th>
                        <th>Fetched At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for article in articles %}
                    <tr>
                        <td>{{ article.feed_id }}</td>
                        <td>
                            <a href="{{ article.link }}" target="_blank" class="text-decoration-none">{{ article.title }}</a>
                            {% if article.db_id %}
                                <span class="badge bg-success">In DB</span>
                            {% endif %}
                        </td>
                        <td>{{ article.fetched_at|date:"Y-m-d H:i" }}</td>
                        <td>
                            <a href="{% url 'chitrapat:raw_article_detail' article.feed_id %}" class="btn btn-sm btn-outline-info">Inspect</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="4">No raw articles found.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
